# --- Base de données (Prod sur Railway : PostgreSQL) ---
spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartmatcher}}
spring.datasource.username=${PGUSER:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${PGPASSWORD:${SPRING_DATASOURCE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Configuration Serveur (Railway) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.forward-headers-strategy=framework

# --- CORS ---
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081,https://julienbui.dev}

# --- Upload de fichiers ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
